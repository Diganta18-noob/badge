name: "⚡ Quickdraw Hunter"

on:
  workflow_dispatch:
  workflow_call:

# Quickdraw: Close an issue within 5 minutes of opening it
# Only needs to happen ONCE — this workflow auto-skips after first success

jobs:
  quickdraw:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check if already earned
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=$(gh issue list --repo "$REPO" --search "Quickdraw" --state all --limit 1 --json number | jq length)
          if [ "$COUNT" -gt "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚡ Quickdraw already attempted — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Open issue
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "⚡ Quickdraw badge 🤠" \
            --body "Opening and closing instantly for Quickdraw.
          ⏱️ $(date -u) | 🤖 Badge Bot")
          echo "ISSUE_URL=$ISSUE_URL" >> $GITHUB_ENV

      - name: Close issue instantly
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "$ISSUE_URL" --comment "⚡ Closed for Quickdraw — $(date -u)"

      - name: Notify Telegram
        if: steps.check.outputs.skip != 'true' && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="⚡ *Quickdraw badge earned!*%0AIssue opened and closed in seconds 🤠" \
            -d parse_mode="Markdown" || true
