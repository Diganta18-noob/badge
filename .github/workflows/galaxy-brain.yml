name: "🧠 Galaxy Brain Hunter"

on:
  schedule:
    - cron: '0 12 * * *'    # daily at noon UTC
  workflow_dispatch:
    inputs:
      enable_discussions:
        description: 'Create a Discussion for others to answer'
        type: boolean
        default: true

# Galaxy Brain: Get your Discussion answer marked as "Accepted"
# Bronze: 1, Silver: 10, Gold: 25
# ⚠️ This badge REQUIRES real human interaction — someone must
#    mark your answer as accepted. This workflow helps by:
#    1. Enabling Discussions on the repo
#    2. Creating discoverable Discussion questions
#    3. Tracking your progress
#    4. Sending Telegram reminders with direct action links

jobs:
  galaxy-brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git pull origin main --rebase || true

      - name: Enable Discussions via API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api repos/$REPO \
            --method PATCH \
            -f has_discussions=true 2>/dev/null || echo "Could not enable Discussions — enable manually in Settings"

      - name: Create helpful Discussion question
        if: inputs.enable_discussions == true || inputs.enable_discussions == ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e  # Don't exit on errors — we handle them gracefully

          # Rotate through engaging topics that attract real answers
          DAY_OF_YEAR=$(date +%j)
          TOPICS=(
            "What's your favorite GitHub Action for CI/CD?"
            "Best practices for automating GitHub workflows?"
            "How do you organize your GitHub profile README?"
            "What tools do you use for GitHub badge hunting?"
            "Share your best GitHub Actions workflow tips!"
            "How do you automate your development workflow?"
            "What's the most useful GitHub feature you've discovered?"
            "Best GitHub CLI commands you use daily?"
            "How do you manage multiple GitHub repositories?"
            "What's your strategy for open source contributions?"
          )
          INDEX=$((DAY_OF_YEAR % ${#TOPICS[@]}))
          TOPIC="${TOPICS[$INDEX]}"

          # Get repo node ID
          REPO_ID=$(gh api repos/$REPO --jq '.node_id' 2>/dev/null || echo "")
          if [ -z "$REPO_ID" ]; then
            echo "⚠️ Could not fetch repo node ID — check token permissions"
            exit 0
          fi

          # Get Q&A category ID (or first available)
          CAT_ID=$(gh api repos/$REPO/discussions/categories \
            --jq '[.[] | select(.name == "Q&A" or .slug == "q-a")] | .[0].node_id // empty' 2>/dev/null || echo "")

          if [ -z "$CAT_ID" ]; then
            CAT_ID=$(gh api repos/$REPO/discussions/categories \
              --jq '.[0].node_id // empty' 2>/dev/null || echo "")
          fi

          if [ -n "$CAT_ID" ] && [ -n "$REPO_ID" ]; then
            gh api graphql -f query='
              mutation {
                createDiscussion(input: {
                  repositoryId: "'"$REPO_ID"'"
                  categoryId: "'"$CAT_ID"'"
                  title: "'"$TOPIC"'"
                  body: "Share your tips and experiences! 🧠\n\nThis is a community discussion — your answers help everyone learn.\n\n_🤖 Badge Bot — answer this to help earn Galaxy Brain badges!_"
                }) {
                  discussion { url }
                }
              }
            ' 2>/dev/null && echo "✅ Discussion created: $TOPIC" || echo "⚠️ Could not create Discussion — check GH_PAT permissions"
          else
            echo "⚠️ Missing repo ID or category — enable Discussions with Q&A category in Settings"
          fi

          exit 0  # Always succeed

      - name: Create tracking issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=$(gh issue list --repo "$REPO" --search "Galaxy Brain Tracker" --state open --limit 1 --json number | jq length)
          if [ "$COUNT" -eq "0" ]; then
            gh issue create \
              --repo "$REPO" \
              --title "🧠 Galaxy Brain Tracker" \
              --body "## How to earn Galaxy Brain

          **This badge requires real community interaction.**

          ### Strategy:
          1. Find repos with open Discussion questions:
             → [GitHub Discussions Search](https://github.com/search?q=is%3Aopen+is%3Aunanswered+type%3Adiscussions&type=discussions)
          2. Post a thorough, helpful answer
          3. Wait for the author to mark it as ✅ Accepted

          ### Best Repos to Answer In:
          - [vercel/next.js](https://github.com/vercel/next.js/discussions)
          - [microsoft/vscode](https://github.com/microsoft/vscode/discussions)
          - [facebook/react](https://github.com/facebook/react/discussions)

          ### Tiers:
          | Tier | Accepted Answers |
          |---|---|
          | 🥉 Bronze | 1 |
          | 🥈 Silver | 10 |
          | 🥇 Gold | 25 |

          ---
          *🤖 Badge Bot*"
          fi

      - name: Log progress
        run: |
          mkdir -p logs
          echo "🧠 Galaxy Brain check at $(date -u)" >> logs/galaxy-brain-log.txt
          git add logs/galaxy-brain-log.txt
          git diff --cached --quiet || {
            git commit -m "chore: galaxy brain check $(date -u +%Y-%m-%d)"
            git push origin main || true
          }

      - name: Telegram reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          MSG="🧠 *Galaxy Brain — Daily Action Required*%0A"
          MSG+="━━━━━━━━━━━━━━━━━━━━━━%0A%0A"
          MSG+="📝 *Go answer Discussion questions now!*%0A%0A"
          MSG+="🔗 Quick Links:%0A"
          MSG+="• [Unanswered Discussions](https://github.com/search?q=is%3Aopen+is%3Aunanswered+type%3Adiscussions&type=discussions)%0A"
          MSG+="• [Next.js Discussions](https://github.com/vercel/next.js/discussions)%0A"
          MSG+="• [VS Code Discussions](https://github.com/microsoft/vscode/discussions)%0A%0A"
          MSG+="💡 Tip: Answer thoroughly → get accepted → earn badge!"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MSG" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
