name: "🌐 Open Sourcerer Hunter"

on:
  schedule:
    - cron: '45 */4 * * *'  # every 4 hours at :45
  workflow_dispatch:
  workflow_call:

# Open Sourcerer: Have PRs merged across MULTIPLE public repos
# This workflow finds real contribution opportunities and sends
# direct links via Telegram for you to act on.
# ⚠️ Beta badge — may or may not be awarded

jobs:
  open-sourcerer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git pull origin main --rebase || true

      - name: Find contribution opportunities
        id: find-repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          echo "🌐 Searching for contribution opportunities..."
          echo ""

          # Search for good-first-issue in different languages
          OPPORTUNITIES=""

          echo "=== JavaScript/TypeScript repos ==="
          JS_REPOS=$(gh api search/issues \
            -f q="label:\"good first issue\" state:open language:javascript" \
            -f per_page=3 \
            --jq '.items[] | "• [\(.repository_url | split("/") | .[-2:] | join("/"))] \(.title) → \(.html_url)"' \
            2>/dev/null || echo "Rate limited")
          echo "$JS_REPOS"
          OPPORTUNITIES+="$JS_REPOS\n"

          echo ""
          echo "=== Documentation fixes ==="
          DOC_REPOS=$(gh api search/issues \
            -f q="label:\"good first issue\" label:\"documentation\" state:open" \
            -f per_page=3 \
            --jq '.items[] | "• [\(.repository_url | split("/") | .[-2:] | join("/"))] \(.title) → \(.html_url)"' \
            2>/dev/null || echo "Rate limited")
          echo "$DOC_REPOS"
          OPPORTUNITIES+="$DOC_REPOS\n"

          echo ""
          echo "=== Help Wanted ==="
          HELP_REPOS=$(gh api search/issues \
            -f q="label:\"help wanted\" state:open language:python" \
            -f per_page=3 \
            --jq '.items[] | "• [\(.repository_url | split("/") | .[-2:] | join("/"))] \(.title) → \(.html_url)"' \
            2>/dev/null || echo "Rate limited")
          echo "$HELP_REPOS"
          OPPORTUNITIES+="$HELP_REPOS"

          echo "opportunities<<EOF" >> $GITHUB_OUTPUT
          echo -e "$OPPORTUNITIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create contribution tracker
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=$(gh issue list --repo "$REPO" --search "Open Sourcerer Tracker" --state open --limit 1 --json number | jq length)
          if [ "$COUNT" -eq "0" ]; then
            gh issue create \
              --repo "$REPO" \
              --title "🌐 Open Sourcerer Tracker" \
              --body "## How to earn Open Sourcerer

          **Have PRs merged in multiple different public repos.**

          ### Strategy:
          1. Search: [Good First Issues](https://github.com/search?q=label%3A%22good+first+issue%22+state%3Aopen&type=issues)
          2. Fork the repo
          3. Fix a typo, improve docs, or fix a small bug
          4. Submit a PR
          5. Repeat on different repos

          ### Quick Wins:
          - Fix typos in README files
          - Add missing documentation
          - Update outdated dependency versions in docs
          - Fix broken links

          ### Track your external PRs:
          - [ ] PR to repo 1: ___
          - [ ] PR to repo 2: ___
          - [ ] PR to repo 3: ___

          ---
          *🤖 Badge Bot*" || {
              echo "::warning::Failed to create issue!"
            }
          fi

      - name: Log progress
        run: |
          mkdir -p logs
          echo "🌐 Open Sourcerer check at $(date -u)" >> logs/open-sourcerer-log.txt
          git add logs/open-sourcerer-log.txt
          git diff --cached --quiet || {
            git commit -m "chore: open sourcerer check $(date -u +%Y-%m-%d)"
            git push origin main || true
          }

      - name: Telegram — contribution opportunities
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          MSG="🌐 *Open Sourcerer — Fresh Opportunities*%0A"
          MSG+="━━━━━━━━━━━━━━━━━━━━━━%0A%0A"
          MSG+="🎯 *Contribute to earn the badge!*%0A%0A"
          MSG+="🔗 Quick Links:%0A"
          MSG+="• [Good First Issues (JS)](https://github.com/search?q=label%3A%22good+first+issue%22+state%3Aopen+language%3Ajavascript&type=issues)%0A"
          MSG+="• [Good First Issues (Python)](https://github.com/search?q=label%3A%22good+first+issue%22+state%3Aopen+language%3Apython&type=issues)%0A"
          MSG+="• [Documentation Fixes](https://github.com/search?q=label%3A%22good+first+issue%22+label%3A%22documentation%22+state%3Aopen&type=issues)%0A"
          MSG+="• [Help Wanted](https://github.com/search?q=label%3A%22help+wanted%22+state%3Aopen&type=issues)%0A%0A"
          MSG+="💡 Fix a typo, improve docs, or solve a small bug!"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MSG" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true || true
