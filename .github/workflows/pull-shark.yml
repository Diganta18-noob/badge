name: "🦈 Pull Shark + YOLO Hunter"

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes for FAST progress
  workflow_dispatch:
    inputs:
      pr_count:
        description: 'Number of PRs to create this run (1-5)'
        required: false
        default: '4'
  workflow_call:

# Pull Shark: Merge PRs (Bronze:2, Silver:16, Gold:128)
# YOLO: Merge a PR without review (earned on first run)
# ⚡ TURBO MODE: 4 PRs per run, every 30 min = ~192 PRs/day

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    strategy:
      max-parallel: 1
      matrix:
        iteration: [1, 2, 3, 4, 5]

    steps:
      - name: Check if this iteration runs
        id: should-run
        run: |
          MAX="${{ inputs.pr_count || '4' }}"
          if [ "${{ matrix.iteration }}" -le "$MAX" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if Gold already reached
        if: steps.should-run.outputs.run == 'true'
        id: gold-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGED=$(gh pr list --repo "${{ github.repository }}" --state merged --limit 999 --json number | jq length)
          echo "merged=$MERGED" >> $GITHUB_OUTPUT
          if [ "$MERGED" -ge 128 ]; then
            echo "🥇 GOLD REACHED! ($MERGED PRs) — stopping"
            echo "stop=true" >> $GITHUB_OUTPUT
          else
            echo "stop=false" >> $GITHUB_OUTPUT
            echo "🦈 Current: $MERGED PRs merged"
          fi

      - name: Checkout
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true

      - name: Create branch and commit
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        run: |
          BRANCH="shark-$(date +%s)-$RANDOM-${{ matrix.iteration }}"
          git checkout -b "$BRANCH"
          mkdir -p logs
          NEXT=$((${{ steps.gold-check.outputs.merged }} + ${{ matrix.iteration }}))
          echo "🦈 PR #$NEXT at $(date -u) | Run ${{ github.run_number }}.${{ matrix.iteration }}" >> logs/badge-log.txt
          git add logs/badge-log.txt
          git commit -m "chore: pull shark hunt #$NEXT $(date -u +%Y-%m-%dT%H:%M:%S)"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT=$((${{ steps.gold-check.outputs.merged }} + ${{ matrix.iteration }}))
          PR_URL=$(gh pr create \
            --title "🦈 Pull Shark #$NEXT" \
            --body "PR #$NEXT for Pull Shark badge 🏆
          **Progress:** ${{ steps.gold-check.outputs.merged }} → $NEXT PRs merged
          🤖 Badge Bot | $(date -u)" \
            --base main \
            --head "$BRANCH") || {
              echo "::error::Failed to create PR!"
              exit 1
            }
          echo "PR_URL=$PR_URL" >> $GITHUB_ENV

      - name: Wait & Merge (YOLO — no review)
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            gh pr merge "$PR_URL" --merge --admin && break
            echo "Attempt $i failed, retry in 10s..."
            sleep 10
          done

      - name: Cleanup branch
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push origin --delete "$BRANCH" || true

      - name: Check tier unlock
        if: steps.should-run.outputs.run == 'true' && steps.gold-check.outputs.stop != 'true'
        id: tier
        run: |
          NEXT=$((${{ steps.gold-check.outputs.merged }} + ${{ matrix.iteration }}))
          if [ "$NEXT" -eq 2 ]; then
            echo "unlocked=🥉 Pull Shark BRONZE unlocked!" >> $GITHUB_OUTPUT
          elif [ "$NEXT" -eq 16 ]; then
            echo "unlocked=🥈 Pull Shark SILVER unlocked!" >> $GITHUB_OUTPUT
          elif [ "$NEXT" -eq 128 ]; then
            echo "unlocked=🥇 Pull Shark GOLD unlocked! 🎉🎉🎉" >> $GITHUB_OUTPUT
          else
            echo "unlocked=" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram — tier unlock
        if: steps.should-run.outputs.run == 'true' && steps.tier.outputs.unlocked != '' && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🎉 *BADGE TIER UNLOCKED!*%0A${{ steps.tier.outputs.unlocked }}%0A%0A🦈 Total PRs: $((${{ steps.gold-check.outputs.merged }} + ${{ matrix.iteration }}))" \
            -d parse_mode="Markdown" || true
